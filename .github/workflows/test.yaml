name: Test dotfiles deployments

on: [push]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Deploy dotfiles
        run: ./install.sh

      - name: Test dotfiles deployments
        run: cd test; goss validate -f junit | tee /tmp/goss_validate.xml

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4
        if: success() || failure()
        with:
          report_paths: /tmp/goss_validate.xml
          annotate_only: true
          detailed_summary: true
          include_passed: true

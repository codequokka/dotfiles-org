name: Test dotfiles deployments

on: [push]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Deploy dotfiles
        run: ./install.sh

      - name: Test dotfiles deployments
        run: cd test; goss validate -f tap | tee /tmp/goss_validate.tap

      - uses: pcolby/tap-summary@v1
        with:
          path: /tmp/goss_validate.tap
          summary-file: /tmp/goss_validate.md

      - name: Debug
        run: cat /tmp/goss_validate.tap

      - name: Debug
        run: cat /tmp/goss_validate.md
